<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosaic Focus Timer - Infinite Portal</title>
    <style>
        :root {
            --bg-color: #000;
            --cell-default: #111;
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* グリッドレイアウト */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            grid-auto-rows: minmax(80px, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 2px;
        }

        .cell {
            width: 100%;
            height: 100%;
            background-color: var(--cell-default);
            transition: background-color 2s ease, transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        /* 拡大演出 */
        .cell.zoom-active {
            z-index: 9999 !important;
            transform: scale(50); /* 画面を完全に覆う */
            pointer-events: none;
        }

        /* 中央UI */
        #ui {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 100;
            transition: opacity 0.5s;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 5rem);
            margin: 0;
            letter-spacing: 1rem;
            font-weight: 100;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #status {
            font-size: 0.8rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 10px;
        }

        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="grid"></div>
    
    <div id="ui">
        <h1 id="label">FOCUS</h1>
        <p id="status">Click a square to discover</p>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const ui = document.getElementById('ui');
        const status = document.getElementById('status');
        
        let isRunning = false;
        let cells = [];

// ==========================================
// 設定エリア（拡張版）
// ==========================================
const ASSOCIATE_ID = "mft041-22"; 

// どのジャンルでも使いやすい形容詞
const adjectives = [
    // 汎用・スタイル
    "minimalist", "retro", "portable", "smart", "premium", "industrial", "wooden", "high+end",
    // 機能性
    "ergonomic", "mechanical", "wireless", "silent", "heavy+duty", "compact", "waterproof",
    // 素材感
    "aluminum", "carbon+fiber", "stainless+steel", "titanium", "bamboo"
];

// ジャンルを横断した名詞
const nouns = [
    // デスク・ガジェット
    "keyboard", "mouse", "monitor+arm", "desk+mat", "webcam", "laptop+stand", "usb+hub", "stream+deck",
    // キッチン
    "coffee+maker", "electric+kettle", "mug+warmer", "knife+set", "spice+rack", "blender", "air+fryer",
    // キャンプ・アウトドア
    "lantern", "folding+chair", "cookware+set", "backpack", "sleeping+bag", "multi+tool", "stove",
    // フィットネス・健康
    "yoga+mat", "dumbbell", "massage+gun", "smart+watch", "foam+roller", "balance+board", "resistance+bands"
];

// 特定のジャンルを狙い撃ちするバックアップテーマ
const backupThemes = [
    "desk+setup", "productivity+tools", "minimalist+gadgets",
    "dream+kitchen", "camping+gear", "home+gym", "outdoor+living", "coffee+life"
];
// ==========================================

        function generateRandomKeyword() {
            // 80%の確率で 組み合わせ、20%で単一テーマ
            if (Math.random() > 0.2) {
                const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
                const noun = nouns[Math.floor(Math.random() * nouns.length)];
                return `${adj}+${noun}`;
            } else {
                return backupThemes[Math.floor(Math.random() * backupThemes.length)];
            }
        }

        function createGrid() {
            grid.innerHTML = '';
            cells = [];
            const cellWidth = 80;
            const columns = Math.ceil(window.innerWidth / cellWidth);
            const rows = Math.ceil(window.innerHeight / cellWidth);
            const totalCells = columns * rows;

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handlePortalClick(cell);
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        function handlePortalClick(cell) {
            if (!isRunning) {
                isRunning = true;
                status.innerText = "Scanning the grid...";
                return;
            }

            // 拡大とUI消去
            cell.classList.add('zoom-active');
            ui.classList.add('fade-out');

            // 遷移先の準備
            const keyword = generateRandomKeyword();
            const targetUrl = `https://www.amazon.co.jp/s?k=${keyword}&tag=${ASSOCIATE_ID}`;

            // 0.6秒（アニメーションの山場）で別タブを開く
            setTimeout(() => {
                window.open(targetUrl, '_blank');
                
                // 1秒後に元の状態に復帰させる（連続でクリックできるように）
                setTimeout(() => {
                    cell.classList.remove('zoom-active');
                    ui.classList.remove('fade-out');
                }, 1000);
            }, 600);
        }

        function updateCells() {
            if (!isRunning) return;

            cells.forEach(cell => {
                if (Math.random() > 0.85) {
                    const h = 200 + (Math.random() * 40 - 20); // Focus Blue
                    const s = 30 + (Math.random() * 40);
                    const l = 10 + (Math.random() * 25);
                    cell.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
                }
            });
        }

        // 初期化
        createGrid();
        window.addEventListener('resize', () => {
            if (!document.querySelector('.zoom-active')) createGrid();
        });

        // 演出ループ
        setInterval(updateCells, 1000);

    </script>
</body>
</html>
