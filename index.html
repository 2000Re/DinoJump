<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jump-Dino</title>
    <style>
        :root {
            --bg-color: #f7f7f7;
            --game-bg: white;
            --text-color: #535353;
            --dino-color: #535353;
            --cactus-color: #535353;
            --line-color: #535353;
        }

        .night-mode {
            --bg-color: #202124;
            --game-bg: #202124;
            --text-color: #bdc1c6;
            --dino-color: #bdc1c6;
            --cactus-color: #bdc1c6;
            --line-color: #bdc1c6;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 1s;
            user-select: none;
        }

        .game-container {
            width: 600px;
            height: 200px;
            border-bottom: 2px solid var(--line-color);
            overflow: hidden;
            position: relative;
            background-color: var(--game-bg);
            transition: background-color 1s, border-color 1s;
        }

        .score-container {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 18px;
            z-index: 20;
        }

        #billboard {
            position: absolute;
            bottom: 80px;
            right: -150px;
            width: 120px;
            height: 50px;
            background-color: #ff9900;
            border: 2px solid var(--line-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: white;
            font-size: 10px;
            font-weight: bold;
            text-align: center;
            animation: move-billboard 9s infinite linear;
            z-index: 5;
        }

        @keyframes move-billboard {
            0% { right: -150px; }
            100% { right: 100%; }
        }

        /* --- 恐竜：スクリーンショット[1]を1ドットずつ完全再現 --- */
        #dino {
            width: 5px; 
            height: 5px;
            position: absolute;
            bottom: 44px; /* 接地位置を微調整 */
            left: 50px;
            background: transparent;
            box-shadow: 
                /* 頭部 */
                28px 0px var(--dino-color), 32px 0px var(--dino-color), 36px 0px var(--dino-color), 40px 0px var(--dino-color), 44px 0px var(--dino-color),
                28px 4px var(--dino-color), 32px 4px transparent, 36px 4px var(--dino-color), 40px 4px var(--dino-color), 44px 4px var(--dino-color), /* 目 */
                28px 8px var(--dino-color), 32px 8px var(--dino-color), 36px 8px var(--dino-color), 40px 8px var(--dino-color), 44px 8px var(--dino-color),
                28px 12px var(--dino-color), 32px 12px var(--dino-color), 36px 12px var(--dino-color),
                28px 16px var(--dino-color), 32px 16px var(--dino-color), 36px 16px var(--dino-color), 40px 16px var(--dino-color),
                /* 首と胴体 */
                20px 12px var(--dino-color), 24px 12px var(--dino-color),
                16px 16px var(--dino-color), 20px 16px var(--dino-color), 24px 16px var(--dino-color),
                12px 20px var(--dino-color), 16px 20px var(--dino-color), 20px 20px var(--dino-color), 24px 20px var(--dino-color), 28px 20px var(--dino-color),
                8px 24px var(--dino-color), 12px 24px var(--dino-color), 16px 24px var(--dino-color), 20px 24px var(--dino-color), 24px 24px var(--dino-color), 28px 24px var(--dino-color),
                4px 28px var(--dino-color), 8px 28px var(--dino-color), 12px 28px var(--dino-color), 16px 28px var(--dino-color), 20px 28px var(--dino-color), 24px 28px var(--dino-color),
                4px 32px var(--dino-color), 8px 32px var(--dino-color), 12px 32px var(--dino-color), 16px 32px var(--dino-color), 20px 32px var(--dino-color),
                /* 前足 */
                28px 24px var(--dino-color), 28px 28px var(--dino-color), 32px 28px var(--dino-color),
                /* 尻尾 */
                0px 16px var(--dino-color),
                0px 20px var(--dino-color), 4px 20px var(--dino-color),
                4px 24px var(--dino-color), 8px 24px var(--dino-color),
                /* 後足 */
                12px 36px var(--dino-color), 16px 36px var(--dino-color),
                12px 40px var(--dino-color), 20px 40px var(--dino-color);
            z-index: 10;
        }

        .animate-jump {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { transform: translateY(0); }
            30% { transform: translateY(-100px); }
            70% { transform: translateY(-100px); }
            100% { transform: translateY(0); }
        }

        #cactus {
            width: 5px; 
            height: 5px;
            position: absolute;
            bottom: 38px; 
            right: -24px;
            background: transparent;
            box-shadow: 
                8px 0px var(--cactus-color), 12px 0px var(--cactus-color),
                8px 4px var(--cactus-color), 12px 4px var(--cactus-color),
                8px 8px var(--cactus-color), 12px 8px var(--cactus-color),
                8px 12px var(--cactus-color), 12px 12px var(--cactus-color),
                8px 16px var(--cactus-color), 12px 16px var(--cactus-color),
                8px 20px var(--cactus-color), 12px 20px var(--cactus-color),
                8px 24px var(--cactus-color), 12px 24px var(--cactus-color),
                8px 28px var(--cactus-color), 12px 28px var(--cactus-color),
                8px 32px var(--cactus-color), 12px 32px var(--cactus-color),
                8px 36px var(--cactus-color), 12px 36px var(--cactus-color),
                0px 8px var(--cactus-color), 4px 8px var(--cactus-color),
                0px 12px var(--cactus-color), 4px 12px var(--cactus-color),
                0px 16px var(--cactus-color), 4px 16px var(--cactus-color),
                0px 20px var(--cactus-color), 4px 20px var(--cactus-color),
                4px 24px var(--cactus-color), 8px 24px var(--cactus-color),
                16px 12px var(--cactus-color), 20px 12px var(--cactus-color),
                16px 16px var(--cactus-color), 20px 16px var(--cactus-color),
                16px 20px var(--cactus-color), 20px 20px var(--cactus-color),
                12px 24px var(--cactus-color), 16px 24px var(--cactus-color);
            animation: move 1.6s infinite linear;
            z-index: 10;
        }

        @keyframes move {
            0% { right: -24px; }
            100% { right: 100%; }
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="score-container">
            <span id="high-score">HI 00000</span>
            <span id="score">00000</span>
        </div>

        <a id="billboard" href="https://amzn.to/4eb0mjY" target="_blank">
            SHOP NOW ON<br>AMAZON
        </a>

        <div id="dino"></div>
        <div id="cactus"></div>

        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p style="color: white;">Press Space to Restart</p>
        </div>
    </div>
    
    <p>Press Space or Click to Jump!</p>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const billboard = document.getElementById("billboard");
        const gameOverScreen = document.getElementById("game-over-screen");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const body = document.body;

        let isGameOver = false;
        let score = 0;
        let highScore = localStorage.getItem("dino-hi-score") || 0;

        highScoreElement.innerText = "HI " + String(highScore).padStart(5, '0');

        let scoreTimer = setInterval(() => {
            if (!isGameOver) {
                score++;
                scoreElement.innerText = String(score).padStart(5, '0');
            }
        }, 100);

        setInterval(() => {
            if (!isGameOver) body.classList.toggle("night-mode");
        }, 15000); 

        function handleAction() {
            if (isGameOver) {
                location.reload(); 
            } else {
                jump();
            }
        }

        function jump() {
            if (!dino.classList.contains("animate-jump")) {
                dino.classList.add("animate-jump");
                setTimeout(() => dino.classList.remove("animate-jump"), 500);
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                handleAction();
            }
        });
        document.addEventListener("mousedown", (e) => {
            if (e.target.id === "billboard") return;
            handleAction();
        });

        let checkDead = setInterval(() => {
            let dinoRect = dino.getBoundingClientRect();
            let cactusRect = cactus.getBoundingClientRect();
            let dinoVisualWidth = 48; // 再現した恐竜の幅
            let cactusVisualWidth = 24;

            let dinoStyle = window.getComputedStyle(dino);
            let dinoTransform = dinoStyle.getPropertyValue("transform");
            let translateY = 0;
            if (dinoTransform !== "none") {
                let values = dinoTransform.split('(')[1].split(')')[0].split(',');
                translateY = parseInt(values[5]);
            }

            // X軸：恐竜の体とサボテンの衝突判定
            let isHitX = cactusRect.left < dinoRect.left + dinoVisualWidth - 10 && 
                         cactusRect.left + cactusVisualWidth > dinoRect.left + 5;
            
            // Y軸：足元がサボテンに触れる高さか
            let isHitY = translateY > -36;

            if (isHitX && isHitY) {
                isGameOver = true;
                cactus.style.animation = "none";
                cactus.style.left = window.getComputedStyle(cactus).getPropertyValue("left");
                billboard.style.animationPlayState = "paused";
                gameOverScreen.style.display = "flex";
                if (score > highScore) localStorage.setItem("dino-hi-score", score);
                clearInterval(checkDead);
                clearInterval(scoreTimer);
            }
        }, 10);
    </script>
</body>
</html>
