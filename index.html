<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mosaic Focus Timer</title>
    <style>
        :root {
            --bg-color: #000;
            --cell-default: #0a0a0a;
            --transition-speed: 0.6s;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: var(--bg-color);
            font-family: 'Inter', -apple-system, sans-serif;
            touch-action: manipulation;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            grid-auto-rows: minmax(70px, 1fr);
            width: 100vw; height: 100vh;
            gap: 1px;
            background-color: #050505;
        }

        .cell {
            width: 100%; height: 100%;
            background-color: var(--cell-default);
            transition: background-color 1.5s ease, transform 0.2s ease, filter 0.2s ease;
            cursor: pointer; position: relative; z-index: 1;
        }

        /* PCでのホバー演出 */
        .cell:hover {
            z-index: 10;
            transform: scale(1.15);
            filter: brightness(2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* クリック時の拡大演出 */
        .cell.zoom-active {
            z-index: 9999 !important;
            transform: scale(60);
            pointer-events: none;
            transition: transform var(--transition-speed) cubic-bezier(0.7, 0, 0.3, 1);
        }

        #ui {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            pointer-events: none; z-index: 100;
            transition: opacity 0.8s ease;
            width: 90%;
        }

        h1 {
            font-size: clamp(2.5rem, 12vw, 5.5rem);
            margin: 0; letter-spacing: 0.8rem; font-weight: 100;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #status {
            font-size: 0.75rem; letter-spacing: 0.2rem;
            text-transform: uppercase; opacity: 0.5; margin-top: 15px;
        }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div id="grid"></div>
    
    <div id="ui">
        <h1 id="label">FOCUS</h1>
        <p id="status">Tilt & Click to explore</p>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const ui = document.getElementById('ui');
        const status = document.getElementById('status');
        
        let isRunning = false;
        let cells = [];
        let gyroData = { beta: 0, gamma: 0 };

        // ==========================================
        // 設定エリア（拡張版）
        // ==========================================
        const ASSOCIATE_ID = "mft041-22"; 

        const adjectives = [
            "minimalist", "retro", "portable", "smart", "premium", "industrial", "wooden", "high+end",
            "ergonomic", "mechanical", "wireless", "silent", "heavy+duty", "compact", "waterproof",
            "aluminum", "carbon+fiber", "stainless+steel", "titanium", "bamboo"
        ];

        const nouns = [
            "keyboard", "mouse", "monitor+arm", "desk+mat", "webcam", "laptop+stand", "usb+hub", "stream+deck",
            "coffee+maker", "electric+kettle", "mug+warmer", "knife+set", "spice+rack", "blender", "air+fryer",
            "lantern", "folding+chair", "cookware+set", "backpack", "sleeping+bag", "multi+tool", "stove",
            "yoga+mat", "dumbbell", "massage+gun", "smart+watch", "foam+roller", "balance+board", "resistance+bands"
        ];

        const backupThemes = [
            "desk+setup", "productivity+tools", "minimalist+gadgets",
            "dream+kitchen", "camping+gear", "home+gym", "outdoor+living", "coffee+life"
        ];
        // ==========================================

        function generateRandomKeyword() {
            if (Math.random() > 0.2) {
                const adj = adjectives[Math.floor(Math.random() * adjectives.length)];
                const noun = nouns[Math.floor(Math.random() * nouns.length)];
                return `${adj}+${noun}`;
            }
            return backupThemes[Math.floor(Math.random() * backupThemes.length)];
        }

        function createGrid() {
            grid.innerHTML = '';
            cells = [];
            const cellWidth = 70;
            const columns = Math.ceil(window.innerWidth / cellWidth);
            const rows = Math.ceil(window.innerHeight / cellWidth);
            for (let i = 0; i < columns * rows; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // ホバー時の発光
                cell.addEventListener('mouseenter', () => {
                    if (isRunning) {
                        const h = 200 + (Math.random() * 40 - 20);
                        cell.style.backgroundColor = `hsl(${h}, 70%, 50%)`;
                        cell.style.boxShadow = `0 0 20px hsl(${h}, 70%, 50%)`;
                    }
                });
                cell.addEventListener('mouseleave', () => {
                    cell.style.boxShadow = 'none';
                });

                cell.addEventListener('click', () => handlePortalClick(cell));
                grid.appendChild(cell);
                cells.push(cell);
            }
        }

        async function initGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                } catch (e) { console.error(e); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            gyroData.beta = event.beta || 0;
            gyroData.gamma = event.gamma || 0;
        }

        function handlePortalClick(cell) {
            if (!isRunning) {
                isRunning = true;
                status.innerText = "Exploring...";
                initGyro(); 
                return;
            }

            cell.classList.add('zoom-active');
            ui.classList.add('fade-out');

            const keyword = generateRandomKeyword();
            const targetUrl = `https://www.amazon.co.jp/s?k=${keyword}&tag=${ASSOCIATE_ID}`;

            setTimeout(() => {
                window.open(targetUrl, '_blank');
                setTimeout(() => {
                    cell.classList.remove('zoom-active');
                    ui.classList.remove('fade-out');
                }, 1200);
            }, 600);
        }

        function updateCells() {
            if (!isRunning) return;

            const gyroHueShift = gyroData.gamma * 0.6; 
            const gyroLightShift = Math.abs(gyroData.beta) * 0.15;

            cells.forEach(cell => {
                if (Math.random() > 0.94) {
                    const h = (200 + gyroHueShift) + (Math.random() * 30 - 15);
                    const s = 40 + (Math.random() * 30);
                    const l = (10 + gyroLightShift) + (Math.random() * 10);
                    cell.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
                }
            });
        }

        createGrid();
        window.addEventListener('resize', () => { if (!document.querySelector('.zoom-active')) createGrid(); });
        setInterval(updateCells, 1000);
    </script>
</body>
</html>
